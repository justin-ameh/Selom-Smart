<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="noindex,nofollow"><title>Administration — SELOM SMART</title><link rel="stylesheet" href="styles.css"><style>body{background:#07111f}.admin-shell{max-width:1180px;margin:auto;padding:40px 20px}.admin-top{display:flex;justify-content:space-between;color:#fff}.admin-top a{color:#50d7ff}.admin-panel{margin-top:25px;padding:28px;border-radius:20px;background:#fff}.admin-login{max-width:430px;margin:80px auto}.admin-login label,.product-form label{display:grid;gap:6px;margin:12px 0;color:#697386;font-size:10px}.admin-login input,.product-form input{height:44px;border:1px solid #dfe5ee;border-radius:9px;padding:0 11px}.admin-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}.admin-table{width:100%;border-collapse:collapse}.admin-table th,.admin-table td{padding:11px 7px;border-bottom:1px solid #dfe5ee;text-align:left;font-size:10px}.product-form{display:grid;grid-template-columns:1fr 1fr;gap:0 10px}.product-form .wide{grid-column:1/-1}@media(max-width:750px){.admin-grid{grid-template-columns:1fr}.product-form{grid-template-columns:1fr}.product-form .wide{grid-column:auto}}</style></head><body><main class="admin-shell"><header class="admin-top"><h1 style="font-size:28px;letter-spacing:-1px">SELOM SMART · Admin</h1><a href="/">Voir la boutique</a></header><section class="admin-panel admin-login" id="login-panel"><h2>Connexion</h2><p>Utilisez les identifiants configurés sur le serveur.</p><form id="login-form"><label>E-mail<input name="email" type="email" required></label><label>Mot de passe<input name="password" type="password" required></label><button class="primary full">Se connecter</button><p id="login-message"></p></form></section><section id="dashboard" hidden><div class="admin-grid"><div class="admin-panel"><h2>Commandes récentes</h2><div style="overflow:auto"><table class="admin-table"><thead><tr><th>Référence</th><th>Client</th><th>Total</th><th>Paiement</th></tr></thead><tbody id="orders-body"></tbody></table></div></div><div class="admin-panel"><h2>Ajouter un produit</h2><form class="product-form" id="product-form"><label>Nom<input name="name" required></label><label>Slug<input name="slug" required pattern="[a-z0-9-]+"></label><label>Marque<input name="brand" required></label><label>Catégorie<input name="category" required value="Milieu de gamme"></label><label>Prix FCFA<input name="price" type="number" min="0" required></label><label>Ancien prix<input name="oldPrice" type="number" min="0" value="0"></label><label>Stock<input name="stock" type="number" min="0" required></label><label>Stockage<input name="storage" value="128 Go"></label><label>RAM<input name="ram" value="8 Go"></label><label>Couleur<input name="color"></label><label>Badge<input name="badge" value="Nouveau"></label><label>Couleur visuelle<input name="accent" type="color" value="#2f6bff"></label><label class="wide">Description<input name="description" required minlength="10"></label><label class="wide">URL de l’image<input name="imageUrl" type="url"></label><button class="primary full wide">Ajouter au catalogue</button><p id="product-message"></p></form></div></div></section></main><script src="admin.js"></script></body></html>
