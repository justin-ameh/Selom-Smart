services:
  - type: web
    name: selom-smart
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SITE_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_SSL
        value: "true"
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CINETPAY_SITE_ID
        sync: false
      - key: CINETPAY_API_KEY
        sync: false
      - key: WHATSAPP_NUMBER
        value: "22899234616"
